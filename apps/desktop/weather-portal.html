<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌤️ Weather Portal - 天气查询工具</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #e2e8f0;
            --sub: #94a3b8;
            --border: #334155;
            --danger: #f87171;
            --warm: #fb923c;
            --cold: #60a5fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        /* ── 背景动态粒子 ── */
        .bg-particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bg-particles span {
            position: absolute;
            font-size: 1.5rem;
            animation: floatUp linear infinite;
            opacity: 0.15;
        }
        @keyframes floatUp {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            20%  { opacity: 0.2; }
            80%  { opacity: 0.2; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* ── 主容器 ── */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 560px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* ── 头部 ── */
        .header {
            text-align: center;
        }
        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .header .subtitle {
            color: var(--sub);
            font-size: 0.95rem;
            margin-top: 0.25rem;
        }

        /* ── 搜索栏 ── */
        .search-box {
            display: flex;
            gap: 0.6rem;
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 0.5rem;
            transition: border-color 0.25s;
        }
        .search-box:focus-within {
            border-color: var(--accent);
        }
        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 1rem;
            padding: 0.6rem 0.8rem;
        }
        .search-box input::placeholder {
            color: var(--sub);
        }
        .search-box button {
            background: var(--accent);
            color: #0f172a;
            border: none;
            border-radius: 11px;
            padding: 0.7rem 1.3rem;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
            transition: filter 0.2s, transform 0.15s;
            white-space: nowrap;
        }
        .search-box button:hover {
            filter: brightness(1.1);
            transform: scale(1.03);
        }
        .search-box button:active {
            transform: scale(0.97);
        }

        /* ── 快捷城市 ── */
        .quick-cities {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .quick-cities .chip {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--sub);
            padding: 0.45rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-cities .chip:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ── 加载 / 错误 / 空状态 ── */
        .status-msg {
            text-align: center;
            padding: 2rem;
            color: var(--sub);
            font-size: 0.95rem;
        }
        .status-msg.error {
            color: var(--danger);
        }
        .spinner {
            display: inline-block;
            width: 28px; height: 28px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── 天气卡片 ── */
        .weather-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.8rem;
            display: none;
            animation: fadeIn 0.35s ease;
        }
        .weather-card.visible { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.2rem;
        }
        .card-header .city-name {
            font-size: 1.4rem;
            font-weight: 700;
        }
        .card-header .date {
            color: var(--sub);
            font-size: 0.85rem;
        }
        .card-header .country {
            color: var(--sub);
            font-size: 0.8rem;
            background: rgba(148,163,184,0.1);
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
        }

        .main-temp {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .main-temp .icon {
            font-size: 4rem;
            line-height: 1;
        }
        .main-temp .temp {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -2px;
        }
        .main-temp .unit {
            font-size: 1.3rem;
            color: var(--sub);
            margin-left: 2px;
        }
        .main-temp .desc {
            font-size: 1rem;
            color: var(--sub);
            margin-left: 1rem;
            text-transform: capitalize;
        }

        .feels-like {
            color: var(--sub);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        /* ── 详情网格 ── */
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
        }
        .detail-item {
            background: rgba(148,163,184,0.06);
            border-radius: 12px;
            padding: 0.9rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.7rem;
        }
        .detail-item .d-icon {
            font-size: 1.4rem;
        }
        .detail-item .d-label {
            font-size: 0.75rem;
            color: var(--sub);
        }
        .detail-item .d-value {
            font-size: 0.95rem;
            font-weight: 600;
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            color: var(--sub);
            font-size: 0.75rem;
            margin-top: 1rem;
        }
        .footer a {
            color: var(--accent);
            text-decoration: none;
        }
    </style>
</head>
<body>

<!-- 背景飘浮动画 -->
<div class="bg-particles" id="bgParticles"></div>

<div class="container">
    <!-- 头部 -->
    <div class="header">
        <h1>🌤️ Weather Portal</h1>
        <p class="subtitle">全球城市天气查询 · 实时数据</p>
    </div>

    <!-- 搜索 -->
    <div class="search-box">
        <input
            type="text"
            id="cityInput"
            placeholder="输入城市名，如 London, Tokyo, 北京..."
            autocomplete="off"
        />
        <button id="searchBtn">🔍 查询</button>
    </div>

    <!-- 快捷城市 -->
    <div class="quick-cities">
        <span class="chip" data-city="Beijing">北京</span>
        <span class="chip" data-city="Shanghai">上海</span>
        <span class="chip" data-city="Tokyo">东京</span>
        <span class="chip" data-city="London">伦敦</span>
        <span class="chip" data-city="New York">纽约</span>
        <span class="chip" data-city="Singapore">新加坡</span>
        <span class="chip" data-city="Sydney">悉尼</span>
        <span class="chip" data-city="Paris">巴黎</span>
    </div>

    <!-- 状态区 -->
    <div class="status-msg" id="statusMsg">
        👆 输入城市名或点击快捷城市开始查询
    </div>

    <!-- 天气卡片 -->
    <div class="weather-card" id="weatherCard">
        <div class="card-header">
            <div>
                <div class="city-name" id="cityName">--</div>
                <div class="date" id="dateStr">--</div>
            </div>
            <span class="country" id="countryBadge">--</span>
        </div>
        <div class="main-temp">
            <span class="icon" id="weatherIcon">🌈</span>
            <span class="temp" id="tempValue">--</span>
            <span class="unit">°C</span>
            <span class="desc" id="weatherDesc">--</span>
        </div>
        <div class="feels-like" id="feelsLike">体感温度 --°C</div>
        <div class="details-grid">
            <div class="detail-item">
                <span class="d-icon">💧</span>
                <div><div class="d-label">湿度</div><div class="d-value" id="humidity">--%</div></div>
            </div>
            <div class="detail-item">
                <span class="d-icon">🌬️</span>
                <div><div class="d-label">风速</div><div class="d-value" id="windSpeed">-- km/h</div></div>
            </div>
            <div class="detail-item">
                <span class="d-icon">👁️</span>
                <div><div class="d-label">能见度</div><div class="d-value" id="visibility">-- km</div></div>
            </div>
            <div class="detail-item">
                <span class="d-icon">🌡️</span>
                <div><div class="d-label">气压</div><div class="d-value" id="pressure">-- hPa</div></div>
            </div>
        </div>
    </div>

    <div class="footer">
        数据来源 <a href="https://openweathermap.org" target="_blank">OpenWeatherMap</a> · 请替换 API Key 后使用
    </div>
</div>

<script>
    /* ══════════════════════════════════════
       CONFIG — 替换成你自己的 OpenWeatherMap API Key
       ══════════════════════════════════════ */
    const API_KEY = 'YOUR_API_KEY_HERE'; // 👈 免费注册: https://openweathermap.org/api
    const BASE_URL = 'https://api.openweathermap.org/data/2.5/weather';

    /* ── DOM 引用 ── */
    const cityInput    = document.getElementById('cityInput');
    const searchBtn    = document.getElementById('searchBtn');
    const statusMsg    = document.getElementById('statusMsg');
    const weatherCard  = document.getElementById('weatherCard');
    const chips        = document.querySelectorAll('.chip');

    /* ── 背景粒子 ── */
    (function initParticles() {
        const container = document.getElementById('bgParticles');
        const icons = ['☁️','🌧️','❄️','💧','🌙','⭐','☀️','🌬️'];
        for (let i = 0; i < 20; i++) {
            const span = document.createElement('span');
            span.textContent = icons[Math.floor(Math.random() * icons.length)];
            span.style.left = Math.random() * 100 + '%';
            span.style.animationDuration = (10 + Math.random() * 20) + 's';
            span.style.animationDelay = Math.random() * 15 + 's';
            container.appendChild(span);
        }
    })();

    /* ── 工具函数 ── */
    function showStatus(msg, isError = false) {
        statusMsg.style.display = 'block';
        statusMsg.className = 'status-msg' + (isError ? ' error' : '');
        statusMsg.innerHTML = msg;
        weatherCard.classList.remove('visible');
    }

    function hideStatus() {
        statusMsg.style.display = 'none';
    }

    function showLoading() {
        statusMsg.style.display = 'block';
        statusMsg.className = 'status-msg';
        statusMsg.innerHTML = '<span class="spinner"></span><br>正在获取天气数据...';
        weatherCard.classList.remove('visible');
    }

    function getWeatherIcon(code) {
        if (code >= 200 && code < 300) return '⛈️';
        if (code >= 300 && code < 400) return '🌦️';
        if (code >= 500 && code < 511) return '🌧️';
        if (code === 511) return '🌨️';
        if (code >= 520 && code < 600) return '🌧️';
        if (code >= 600 && code < 700) return '❄️';
        if (code === 701) return '🌫️';
        if (code === 711) return '💨';
        if (code === 721) return '🌥️';
        if (code === 741) return '🌁';
        if (code === 800) return '☀️';
        if (code === 801) return '🌤️';
        if (code === 802) return '⛅';
        if (code >= 803) return '☁️';
        return '🌈';
    }

    function formatDate() {
        const now = new Date();
        const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        return now.toLocaleDateString('zh-CN', opts);
    }

    /* ── 渲染天气 ── */
    function renderWeather(data) {
        hideStatus();
        weatherCard.classList.add('visible');

        document.getElementById('cityName').textContent    = data.name;
        document.getElementById('dateStr').textContent     = formatDate();
        document.getElementById('countryBadge').textContent = data.sys.country;
        document.getElementById('weatherIcon').textContent  = getWeatherIcon(data.weather[0].id);
        document.getElementById('tempValue').textContent    = Math.round(data.main.temp);
        document.getElementById('weatherDesc').textContent  = data.weather[0].description;
        document.getElementById('feelsLike').textContent    = `体感温度 ${Math.round(data.main.feels_like)}°C`;
        document.getElementById('humidity').textContent     = data.main.humidity + '%';
        document.getElementById('windSpeed').textContent    = data.wind.speed + ' km/h';
        document.getElementById('visibility').textContent   = (data.visibility / 1000).toFixed(1) + ' km';
        document.getElementById('pressure').textContent     = data.main.pressure + ' hPa';
    }

    /* ── 获取天气 ── */
    async function fetchWeather(city) {
        if (API_KEY === 'YOUR_API_KEY_HERE') {
            showStatus('⚠️ 请先替换 <code>API_KEY</code> 为你的 OpenWeatherMap Key（免费注册即可）', true);
            return;
        }

        showLoading();

        try {
            const url = `${BASE_URL}?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric&lang=zh_cn`;
            const res = await fetch(url);

            if (!res.ok) {
                if (res.status === 404) throw new Error('城市未找到，请检查拼写');
                if (res.status === 401) throw new Error('API Key 无效，请检查配置');
                throw new Error(`请求失败 (${res.status})`);
            }

            const data = await res.json();
            renderWeather(data);
        } catch (err) {
            showStatus('❌ ' + err.message, true);
        }
    }

    /* ── 事件绑定 ── */
    searchBtn.addEventListener('click', () => {
        const city = cityInput.value.trim();
        if (!city) {
            showStatus('请输入城市名称', true);
            return;
        }
        fetchWeather(city);
    });

    cityInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            searchBtn.click();
        }
    });

    chips.forEach(chip => {
        chip.addEventListener('click', () => {
            const city = chip.dataset.city;
            cityInput.value = city;
            fetchWeather(city);
        });
    });
</script>
</body>
</html>
